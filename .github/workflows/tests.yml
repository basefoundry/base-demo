name: Validate Demo

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    env:
      BASE_CACHE_DIR: ${{ github.workspace }}/.base-cache
      BASE_BASH_LIBS_DIR: ${{ github.workspace }}/.dependencies/base-bash-libs/lib/bash
      BASE_SETUP_NOTIFY: "false"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      BASE_DEMO_ENV: baseline
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Bash and BATS
        run: brew install bash bats-core

      - name: Validate repository baseline
        run: ./tests/validate.sh

      - name: Run demo script tests
        run: bats tests/demo_test.bats

      - name: Run installer tests
        run: bats tests/install_test.bats

      - name: Run representative environment tests
        run: >
          bats
          tests/services_test.bats
          tests/environments_test.bats
          tests/infra_test.bats
          tests/go_api_test.bats
          tests/python_api_test.bats
          tests/java_services_test.bats
          tests/native_services_test.bats
          tests/demo_console_test.bats

      # Pin the released Base version that includes language-profile support.
      - name: Check out Base
        run: |
          git clone --depth 1 --branch v1.7.0 https://github.com/basefoundry/base.git ../base

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: basefoundry/base-bash-libs
          ref: 5e52e79a8d6f61f82e5e95a07c75da256642f92e
          path: .dependencies/base-bash-libs

      - name: Set up Base
        run: ../base/bin/basectl setup base --no-notify

      - name: Disable IDE setup in CI
        run: |
          mkdir -p ~/.base.d
          {
            printf '\nide:\n'
            printf '  enabled: false\n'
          } >> ~/.base.d/config.yaml

      - name: Run base-demo Python CLI tests
        run: >
          PYTHONPATH="../base/lib/python:../base/cli/python:lib/python"
          ~/.base.d/base/.venv/bin/python
          -m unittest
          lib.python.base_demo_cli.tests.test_cli

      - name: Set up base-demo
        run: ../base/bin/basectl setup base-demo --manifest ./base_manifest.yaml --no-notify

      - name: Check base-demo
        run: ../base/bin/basectl check base-demo --manifest ./base_manifest.yaml

      - name: Doctor base-demo
        run: ../base/bin/basectl doctor base-demo --manifest ./base_manifest.yaml

      - name: Check repository baseline through Base
        run: ../base/bin/basectl repo check .

      - name: Review base-demo manifest commands
        run: |
          ../base/bin/basectl run base-demo --workspace .. --list
          ../base/bin/basectl build base-demo --workspace .. --list
          ../base/bin/basectl test base-demo --workspace .. --dry-run

      - name: Trust base-demo manifest commands
        run: ../base/bin/basectl trust allow base-demo --workspace ..

      - name: Run base-demo hello command
        run: ../base/bin/basectl run base-demo --workspace .. hello

      - name: Run base-demo Python info command
        run: ../base/bin/basectl run base-demo --workspace .. python-info -- info

      - name: Run base-demo Python env command
        run: ../base/bin/basectl run base-demo --workspace .. python-info -- env

      - name: Show representative services
        run: ../base/bin/basectl run base-demo --workspace .. services -- status

      - name: Check representative services
        run: ../base/bin/basectl run base-demo --workspace .. services -- check

      - name: Validate representative environments
        run: ../base/bin/basectl run base-demo --workspace .. environments -- validate --all

      - name: Dry-run representative service startup
        env:
          BASE_DEMO_SERVICES_DRY_RUN: "1"
        run: ../base/bin/basectl run base-demo --workspace .. services -- start

      - name: Test base-demo
        run: ../base/bin/basectl test base-demo --workspace ..

      - name: Build base-demo
        run: ../base/bin/basectl build base-demo --workspace ..

      - name: Show Base docs URL
        run: ../base/bin/basectl docs --show-url

      - name: Run base-demo non-interactively
        run: ../base/bin/basectl demo base-demo --workspace .. -- --non-interactive

  validate-ubuntu:
    runs-on: ubuntu-latest
    env:
      BASE_CACHE_DIR: ${{ github.workspace }}/.base-cache
      BASE_BASH_LIBS_DIR: ${{ github.workspace }}/.dependencies/base-bash-libs/lib/bash
      BASE_DEMO_ENV: baseline
      BASE_SETUP_NOTIFY: "false"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Ubuntu prerequisites
        run: sudo apt-get update && sudo apt-get install -y python3 python3-venv python3-pip jq

      - name: Check out Base
        run: |
          git clone --depth 1 --branch v1.7.0 https://github.com/basefoundry/base.git ../base

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: basefoundry/base-bash-libs
          ref: 5e52e79a8d6f61f82e5e95a07c75da256642f92e
          path: .dependencies/base-bash-libs

      - name: Set up Base on Ubuntu
        run: ../base/bin/basectl setup base --yes --no-notify

      - name: Validate Ubuntu dev profile setup
        run: |
          ../base/bin/basectl setup base --profile dev --yes --no-notify
          bats --version
          gh --version
          shellcheck --version

      - name: Check base-demo in CI mode
        run: ../base/bin/basectl ci check base-demo --manifest ./base_manifest.yaml --format json | tee /tmp/base-demo-ci.json

      - name: Verify CI JSON status
        run: jq -e '.status' /tmp/base-demo-ci.json
