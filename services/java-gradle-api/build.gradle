plugins {
    id "java"
}

group = "com.codeforester.basedemo"
version = "0.1.0"

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

tasks.register("serviceTest", JavaExec) {
    classpath = sourceSets.test.runtimeClasspath
    mainClass = "com.codeforester.basedemo.javagradle.JavaGradleApiTest"
}

tasks.named("test") {
    enabled = false
}

tasks.named("check") {
    dependsOn("serviceTest")
}
